<!-- Google Analytics (gtag.js) — defined here, but loaded only after the
     visitor gives consent via the cookie banner (see consent-banner.html). -->
<script>
  window.__loadGoogleAnalytics = window.__loadGoogleAnalytics || function () {
    if (window.__gaLoaded) { return; }
    window.__gaLoaded = true;

    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google.tracking_id }}';
    document.head.appendChild(s);

    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    window.gtag = gtag;
    gtag('js', new Date());
    gtag('config', '{{ site.analytics.google.tracking_id }}', { 'anonymize_ip': {{ site.analytics.google.anonymize_ip | default: false }} });
  };
</script>
